  <link rel="stylesheet" href="{{ "/assets/main.css" | relative_url }}">
  {%- feed_meta -%}

  <style>
    /* 1. 针对所有标题取消强制大写限制 */

    .math-font {
        font-family: "Times New Roman", Times, serif;
        font-style: italic;
    }
